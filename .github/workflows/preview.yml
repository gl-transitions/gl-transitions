name: Preview

on:
  pull_request:
    branches: [master]
    paths:
      - 'transitions/*.glsl'

  workflow_dispatch:
    inputs:
      transition:
        description: 'Transition name (optional — auto-detects from PR if omitted)'
        required: false
        type: string
      pr_number:
        description: 'PR number to preview and comment on'
        required: true
        type: string

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

# SECURITY: executes untrusted PR code (renders the contributed shader), so it runs
# read-only with no secrets. Publishing GIFs and commenting happens in the trusted
# preview-comment.yml (workflow_run), which never executes PR code.
permissions:
  contents: read
  pull-requests: read

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      TRANSITION_NAME: ${{ inputs.transition }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch master for diff
        if: github.event_name == 'pull_request'
        run: git fetch origin master

      - name: Checkout PR branch for workflow_dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          git fetch origin "pull/${PR_NUMBER}/head" --depth=1
          git checkout FETCH_HEAD -- transitions/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri libglapi-mesa libosmesa6 ffmpeg

      - name: Install preview dependencies
        run: cd scripts/preview && npm install

      - name: Detect transitions
        id: detect
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$TRANSITION_NAME" ]; then
              # Single transition specified
              if [ ! -f "transitions/${TRANSITION_NAME}.glsl" ]; then
                echo "::error::transitions/${TRANSITION_NAME}.glsl not found"
                exit 1
              fi
              echo "files=transitions/${TRANSITION_NAME}.glsl" >> $GITHUB_OUTPUT
            else
              # Auto-detect from PR diff — normalize nested dirs (transitions/X.glsl/X.glsl -> transitions/X.glsl)
              FILES=$(gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" --name-only \
                | grep '^transitions/.*\.glsl$\|^transitions/.*\.glsl/' \
                | sed 's|transitions/\(.*\.glsl\)/.*|transitions/\1|' \
                | sort -u | head -20 || true)
              FILES=$(echo "$FILES" | tr '\n' ' ')
              if [ -z "$FILES" ]; then
                echo "::warning::No .glsl files found in PR #${PR_NUMBER}"
                echo "files=" >> $GITHUB_OUTPUT
              else
                echo "Detected files: $FILES"
                echo "files=$FILES" >> $GITHUB_OUTPUT
              fi
            fi
            echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            FILES=$(git diff --name-only origin/master...HEAD -- 'transitions/*.glsl' | tr '\n' ' ')
            if [ -z "$FILES" ]; then
              echo "No .glsl files changed"
              echo "files=" >> $GITHUB_OUTPUT
            else
              echo "files=$FILES" >> $GITHUB_OUTPUT
            fi
            echo "pr=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate and render previews
        if: steps.detect.outputs.files != ''
        env:
          FILES: ${{ steps.detect.outputs.files }}
          PR_NUMBER: ${{ steps.detect.outputs.pr }}
        run: |
          mkdir -p /tmp/previews
          # PR number travels via the artifact since workflow_run data is empty for forks.
          printf '%s' "$PR_NUMBER" > /tmp/previews/pr.txt
          xvfb-run -s "-ac -screen 0 1280x1024x24" bash -c '
            for file in $FILES; do
              name=$(basename "$file" .glsl)
              echo "=== Validating $name ==="
              node scripts/preview/validate-transition.js \
                --transition "$file" > "/tmp/previews/${name}.validation.json" 2>/dev/null || true
              cat "/tmp/previews/${name}.validation.json"
              echo ""
              echo "=== Rendering $name ==="
              node scripts/preview/render-transition.js \
                --transition "$file" \
                --output "/tmp/previews/${name}.gif" 2>&1 || echo "Failed: $name"
            done
          '

      - name: Upload previews as artifact
        if: steps.detect.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: transition-previews
          path: |
            /tmp/previews/*.gif
            /tmp/previews/*.validation.json
            /tmp/previews/pr.txt
          if-no-files-found: warn
