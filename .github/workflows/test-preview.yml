name: Test Preview

on:
  push:
    branches: [master]
    paths:
      - 'scripts/preview/**'
      - '.github/workflows/test-preview.yml'
  pull_request:
    branches: [master]
    paths:
      - 'scripts/preview/**'
      - '.github/workflows/test-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri libglapi-mesa libosmesa6 ffmpeg

      - name: Install preview dependencies
        run: cd scripts/preview && npm install

      - name: Validate test transitions
        run: |
          xvfb-run -s "-ac -screen 0 1280x1024x24" bash -c '
            node scripts/preview/validate-transition.js -t transitions/fade.glsl &&
            node scripts/preview/validate-transition.js -t transitions/crosswarp.glsl &&
            node scripts/preview/validate-transition.js -t transitions/Bounce.glsl
          '

      - name: Render test transitions
        run: |
          mkdir -p /tmp/test-previews
          xvfb-run -s "-ac -screen 0 1280x1024x24" bash -c '
            node scripts/preview/render-transition.js \
              --transition transitions/fade.glsl \
              --output /tmp/test-previews/fade.gif &&
            node scripts/preview/render-transition.js \
              --transition transitions/crosswarp.glsl \
              --output /tmp/test-previews/crosswarp.gif &&
            node scripts/preview/render-transition.js \
              --transition transitions/Bounce.glsl \
              --output /tmp/test-previews/Bounce.gif
          '

      - name: Verify GIFs
        run: |
          for gif in /tmp/test-previews/*.gif; do
            size=$(stat -c%s "$gif")
            echo "$(basename $gif): ${size} bytes"
            if [ "$size" -lt 1000 ]; then
              echo "ERROR: $gif is too small, likely broken"
              exit 1
            fi
          done

      - name: Upload test GIFs
        uses: actions/upload-artifact@v4
        with:
          name: test-preview-gifs
          path: /tmp/test-previews/*.gif
